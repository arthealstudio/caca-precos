name: caca-precos

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: caca-precos
  cancel-in-progress: false

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Rodar caçada
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
          WHATSAPP_APIKEY: ${{ secrets.WHATSAPP_APIKEY }}
        run: npm run hunt
      - name: Commit do histórico
        run: |
          git config user.name "caca-precos-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/history.json data/dashboard.json
          git commit -m "chore: caca $(date -u +%F-%H%M)" || echo "sem mudancas"
          git push
      - name: Montar site
        run: npm run build:site
      - name: Upload Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
  deploy:
    needs: hunt
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
